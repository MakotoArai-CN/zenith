name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.1"

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: make test

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: zig build test

      - name: Build native release (Unix)
        if: runner.os != 'Windows'
        run: make release

      - name: Build native release (Windows)
        if: runner.os == 'Windows'
        run: zig build -Doptimize=ReleaseSmall

  build-release:
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.1"

      - name: Build all cross-compilation targets
        run: make release

      - name: Verify build artifacts
        run: |
          ls -la zig-out/bin/
          echo "Built files:"
          find zig-out/bin -type f -name "zenith-*" | wc -l

      - name: Create release archives
        run: |
          mkdir -p release
          cd zig-out/bin
          for file in zenith-*; do
            if [ -f "$file" ]; then
              echo "Processing: $file"
              if echo "$file" | grep -q "windows"; then
                zip "../../release/${file}.zip" "$file"
                echo "Created ZIP: ${file}.zip"
              else
                tar -czf "../../release/${file}.tar.gz" "$file"
                echo "Created TAR.GZ: ${file}.tar.gz"
              fi
            fi
          done
          echo "Release archives created:"
          ls -la ../../release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
