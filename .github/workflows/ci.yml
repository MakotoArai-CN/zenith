name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag_exists: ${{ steps.t.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: v
        run: |
          V=$(grep -oP '\.version\s*=\s*"\K[^"]+' build.zig.zon)
          [ -z "$V" ] && echo "Cannot extract version" && exit 1
          echo "version=v${V}" >> $GITHUB_OUTPUT
      - id: t
        run: |
          git rev-parse "${{ steps.v.outputs.version }}" >/dev/null 2>&1 \
            && echo "exists=true" >> $GITHUB_OUTPUT \
            || echo "exists=false" >> $GITHUB_OUTPUT

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  make: true }
          - { os: windows-latest, make: false }
          - { os: macos-latest,   make: true }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with: { version: "0.15.1" }
      - if: matrix.make
        run: make test && make release
      - if: "!matrix.make"
        run: zig build test && zig build -Doptimize=ReleaseSmall

  build-release:
    needs: [get-version, test]
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && needs.get-version.outputs.tag_exists == 'false')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: mlugg/setup-zig@v2
        with: { version: "0.15.1" }

      - name: Build & package
        run: |
          make release
          mkdir -p release
          cd zig-out/bin
          for f in zenith-*; do
            [ -f "$f" ] || continue
            if echo "$f" | grep -q windows; then
              zip "../../release/${f}.zip" "$f"
            else
              tar -czf "../../release/${f}.tar.gz" "$f"
            fi
          done
          ls -lah ../../release/

      - name: Generate changelog
        id: cl
        run: |
          V="${{ needs.get-version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${V}"
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          [ -z "$PREV" ] \
            && COMMITS=$(git log --oneline --pretty=format:"- %s (%h)" | head -50) \
            || COMMITS=$(git log ${PREV}..HEAD --oneline --pretty=format:"- %s (%h)")

          badge() { echo "| [![${1}](https://img.shields.io/badge/${2}?style=for-the-badge&logo=${3}&logoColor=${4})](${BASE}/${5}) | ${6} |"; }

          {
            echo "CHANGELOG<<EOF"
            echo "## 更新日志"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 下载"
            echo ""
            echo "| 下载 | 说明 |"
            echo "|:----:|:-----|"
            for f in release/*; do
              n=$(basename "$f")
              case "$n" in
                *linux*x86_64*)   badge "Linux x86_64"        "Linux-x86__64-FCC624"        linux  black "$n" "Linux x86_64" ;;
                *linux*aarch64*)  badge "Linux aarch64"       "Linux-aarch64-FCC624"        linux  black "$n" "Linux ARM64" ;;
                *linux*arm*)      badge "Linux ARM"           "Linux-ARM-FCC624"            linux  black "$n" "Linux ARM 32-bit" ;;
                *linux*x86*)      badge "Linux x86"           "Linux-x86-FCC624"            linux  black "$n" "Linux x86 32-bit" ;;
                *windows*x86_64*) badge "Windows x86_64"      "Windows-x86__64-0078D6"      windows white "$n" "Windows x86_64" ;;
                *windows*aarch64*)badge "Windows aarch64"     "Windows-aarch64-0078D6"      windows white "$n" "Windows ARM64" ;;
                *windows*x86*)    badge "Windows x86"         "Windows-x86-0078D6"          windows white "$n" "Windows x86 32-bit" ;;
                *macos*x86_64*)   badge "macOS Intel"         "macOS-Intel-000000"          apple  white "$n" "macOS Intel x86_64" ;;
                *macos*aarch64*)  badge "macOS Apple Silicon" "macOS-Apple%20Silicon-000000" apple  white "$n" "macOS ARM64" ;;
                *)                badge "Download"            "Download-${n}-grey"          "" white "$n" "$n" ;;
              esac
            done
            echo ""
            echo "---"
            echo "> 💡 **Linux/macOS**: 解压后 \`chmod +x zenith-*\` | **Windows**: 解压即用 | **Apple Silicon**: 选 \`aarch64\`"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          name: Release ${{ needs.get-version.outputs.version }}
          body: ${{ steps.cl.outputs.CHANGELOG }}
          files: release/*
          make_latest: true
